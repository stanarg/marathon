<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>BA Marathon</title>
<meta name="description" content="Personal Buenos Aires Marathon training & nutrition companion">
<meta name="theme-color" content="#e4572e">
<link rel="manifest" href="manifest.json">
<!-- iOS standalone / home-screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="BA Marathon">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root{
    --accent:#e4572e; --accent2:#ff8a3d;
    --bg:#f2f2f7; --card:#ffffff; --card2:#ffffff;
    --text:#1c1c1e; --sub:#6b6b70; --hair:#e2e2e7;
    --good:#2fae66; --warn:#e0a100; --bad:#e0453a;
    /* AA-contrast "ink" text on light tints (overridden brighter in dark mode) */
    --good-ink:#1a7a48; --warn-ink:#8a6300; --bad-ink:#c22f24; --acc-ink:#c0431f;
    --chip:#efeff4; --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
    --topH:calc(env(safe-area-inset-top) + 58px);
    --tabH:52px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#000000; --card:#1c1c1e; --card2:#2c2c2e;
      --text:#ffffff; --sub:#9a9aa2; --hair:#38383c;
      --good-ink:#3ddc84; --warn-ink:#ffca3a; --bad-ink:#ff6b60; --acc-ink:#ff8a5c;
      --chip:#2c2c2e; --shadow:none;
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--card); color:var(--text);   /* base/canvas = bar colour, so the bottom strip matches the tab bar */
    -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
  }
  /* ---- Top bar ---- */
  #topbar{
    position:fixed;top:0;left:0;right:0;z-index:20;
    padding-top:env(safe-area-inset-top);
    background:linear-gradient(135deg,#d0431f,#e4572e);
    color:#fff; box-shadow:0 1px 0 rgba(0,0,0,.08); text-shadow:0 1px 2px rgba(0,0,0,.22);
  }
  #topbar .inner{height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 18px}
  #topbar h1{font-size:19px;font-weight:700;margin:0;letter-spacing:-.2px}
  #topbar .sub{font-size:12px;font-weight:600;opacity:.95}
  /* ---- Scroll view ---- */
  #view{
    position:absolute;top:0;left:0;right:0;bottom:0;
    padding:calc(var(--topH) + 8px) 14px calc(var(--tabH) + 20px);
    background:var(--bg);   /* keep the grey page look behind the cards */
    overflow-y:auto; -webkit-overflow-scrolling:touch;
  }
  /* ---- Tab bar ---- */
  #tabbar{
    position:fixed;left:0;right:0;bottom:0;z-index:20;
    display:flex; background:var(--card);
    border-top:.5px solid var(--hair);
    /* flush to the very bottom edge — no home-indicator inset reserved */
    padding-bottom:0;
    backdrop-filter:saturate(1.4) blur(12px);
  }
  #tabbar button{
    flex:1;background:none;border:0;color:var(--sub);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    padding:6px 0 4px; font-size:10.5px;font-weight:600;cursor:pointer;min-height:48px;
  }
  #tabbar button.active{color:var(--accent)}
  #tabbar svg{width:25px;height:25px;display:block}
  /* ---- Cards & bits ---- */
  .card{background:var(--card);border-radius:16px;padding:16px;margin:0 0 14px;box-shadow:var(--shadow)}
  .card h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);margin:0 0 12px}
  .card h3{font-size:16px;font-weight:700;margin:0 0 4px}
  .row{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .muted{color:var(--sub)}
  .tiny{font-size:12px;color:var(--sub);line-height:1.5}
  .big{font-size:15px;line-height:1.5}
  .pill{display:inline-block;background:var(--chip);color:var(--text);border-radius:999px;padding:3px 10px;font-size:12px;font-weight:600;margin:2px 4px 2px 0}
  .pill.acc{background:rgba(228,87,46,.14);color:var(--acc-ink)}
  .pill.good{background:rgba(47,174,102,.16);color:var(--good-ink)}
  .pill.mp{background:rgba(224,69,58,.14);color:var(--bad-ink)}
  .divider{height:.5px;background:var(--hair);margin:12px -16px}
  /* hero */
  .hero{background:linear-gradient(140deg,#c8391b,#e8623a);color:#fff;border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:0 6px 18px rgba(228,87,46,.28);text-shadow:0 1px 2px rgba(0,0,0,.28)}
  .hero .cd{font-size:46px;font-weight:800;line-height:1;letter-spacing:-1px}
  .hero .cdl{font-size:13px;font-weight:600;opacity:.92;margin-top:2px}
  .hero .meta{margin-top:12px;font-size:13px;font-weight:600;opacity:.95;display:flex;gap:8px;flex-wrap:wrap}
  .hero .meta span{background:rgba(0,0,0,.32);padding:3px 10px;border-radius:999px}
  /* metric grid */
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
  .metric{background:var(--card2);border-radius:12px;padding:11px 12px}
  .metric .v{font-size:20px;font-weight:800;letter-spacing:-.3px}
  .metric .l{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
  .metric .k{font-size:11px;color:var(--sub);margin-top:1px}
  /* schedule */
  .wk{background:var(--card);border-radius:14px;margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden}
  .wk.cur{outline:2px solid var(--accent)}
  .wk .hd{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer}
  .wk .num{width:30px;height:30px;border-radius:9px;background:var(--chip);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex:0 0 auto}
  .wk.cur .num{background:var(--accent);color:#fff}
  .wk .t1{font-weight:700;font-size:15px}
  .wk .t2{font-size:12px;color:var(--sub);margin-top:1px}
  .wk .rt{margin-left:auto;text-align:right;font-size:12px;font-weight:600;color:var(--sub);flex:0 0 auto}
  .wk .rt b{color:var(--text);font-size:14px}
  .wk .body{display:none;padding:2px 14px 12px;border-top:.5px solid var(--hair)}
  .wk.open .body{display:block}
  .drow{display:flex;gap:10px;padding:8px 0;border-bottom:.5px solid var(--hair);font-size:14px}
  .drow:last-child{border-bottom:0}
  .drow .dd{width:38px;flex:0 0 auto;font-weight:700;color:var(--sub)}
  .drow.today .dd{color:var(--accent)}
  .drow .dv{flex:1}
  .drow .dk{color:var(--sub);font-size:12px}
  .phase{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--chip);color:var(--sub)}
  .phase.Build,.phase.Peak{background:rgba(228,87,46,.14);color:var(--acc-ink)}
  .phase.Taper,.phase.Race{background:rgba(47,174,102,.16);color:var(--good-ink)}
  /* recipe */
  .rec{border:.5px solid var(--hair);border-radius:12px;padding:12px;margin-bottom:10px}
  .rec .m{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--acc-ink)}
  .rec .n{font-size:15px;font-weight:700;margin:1px 0 5px}
  .rec .ing{font-size:13px;line-height:1.5}
  .rec .mac{font-size:12px;font-weight:600;color:var(--sub);margin-top:6px}
  .rec .up{font-size:12px;color:var(--sub);margin-top:5px;padding-top:5px;border-top:.5px dashed var(--hair)}
  /* forms */
  label.fl{display:block;font-size:12px;font-weight:600;color:var(--sub);margin:10px 0 5px}
  input,select,textarea{
    width:100%;font-size:16px;font-family:inherit;color:var(--text);
    background:var(--card2);border:.5px solid var(--hair);border-radius:10px;padding:11px 12px;
  }
  textarea{min-height:58px;resize:vertical}
  .frow{display:flex;gap:10px}
  .frow>div{flex:1}
  button.btn{
    width:100%;background:var(--accent);color:#fff;border:0;border-radius:12px;
    padding:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:14px;
  }
  button.btn.sec{background:var(--chip);color:var(--text)}
  button.btn.mini{padding:10px;font-size:14px;margin-top:0}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{flex:1;min-width:0;min-height:44px;display:flex;align-items:center;justify-content:center;background:var(--card2);border:.5px solid var(--hair);border-radius:10px;padding:10px 6px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .seg.bad button.on{background:var(--bad);border-color:var(--bad)}
  .logitem{display:flex;gap:10px;padding:11px 0;border-bottom:.5px solid var(--hair);font-size:14px}
  .logitem:last-child{border-bottom:0}
  .logitem .li-d{width:52px;flex:0 0 auto;font-weight:700;color:var(--sub);font-size:12px}
  .flag{border-radius:12px;padding:12px;font-size:13px;line-height:1.5;font-weight:600;margin-top:10px}
  .flag.ok{background:rgba(47,174,102,.14);color:var(--good)}
  .flag.warn{background:rgba(224,161,0,.16);color:var(--warn)}
  .flag.bad{background:rgba(224,69,58,.14);color:var(--bad)}
  .note{background:rgba(228,87,46,.08);border-radius:10px;padding:10px 12px;font-size:12.5px;line-height:1.5;color:var(--text)}
  .empty{text-align:center;color:var(--sub);font-size:13px;padding:16px 0}
  a.link{color:var(--accent);font-weight:600;text-decoration:none}
  /* heatmap */
  .hm{display:flex;gap:3px;overflow-x:auto;padding-bottom:4px}
  .hm .col{display:flex;flex-direction:column;gap:3px}
  .hm .cell{width:15px;height:15px;border-radius:3px;background:var(--chip)}
  .hm .cell.w{background:rgba(47,174,102,.4)}
  .hm .cell.r{background:var(--accent)}
  .hm .cell.rw{background:var(--accent);box-shadow:inset 0 0 0 2px var(--good)}
  .hm .cell.today{outline:1.5px solid var(--text);outline-offset:1px}
  .toast{position:fixed;left:50%;bottom:calc(var(--tabH) + 16px);transform:translateX(-50%);
    background:#000;color:#fff;padding:10px 16px;border-radius:999px;font-size:13px;font-weight:600;
    opacity:0;transition:opacity .2s;z-index:40;pointer-events:none}
  .toast.show{opacity:.92}
  @media (prefers-color-scheme: dark){ .toast{background:#fff;color:#000} }
</style>
</head>
<body>
<header id="topbar"><div class="inner"><h1 id="tb-title">Today</h1><div class="sub" id="tb-sub"></div></div></header>
<main id="view"></main>
<nav id="tabbar"></nav>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================================================
   SOURCE OF TRUTH — transcribed from "Marathon Plan Summary.md"
   and the two companion .docx plans (verified: no conflicts).
   Numbers are not invented. Where the plan gives a formula
   (baseline 2,700–2,800 kcal + 90 kcal/km), the app applies it
   and labels the result as derived.
   ============================================================ */
const START_ISO="2026-07-01";        // Wed — plan day 1
const RACE_ISO ="2026-09-20";        // Sun — marathon
const PLAN_LEN = 82;                 // day-indices 0..81 inclusive
const APP_VERSION = "v11";           // bump on each deploy; shown at the bottom of Today

const PACE={ easy:"6:30–7:00/km", mp:"6:00–6:15/km (target 6:10)", race:"6:00–6:10/km" };
// day kinds: strength | strengthLight | core | run | longrun | rest | race21 | race42
function D(t,kind,km,pace,note){return{t,kind,km:km||0,pace:pace||null,note:note||""};}
const S={ // reusable
  str:  D("Strength — lower body","strength"),
  strL: D("Strength — lower body (light, 2 sets)","strengthLight"),
  core: D("Core & mobility","core"),
  rest: D("Full rest","rest"),
  coreOnly: D("Core only","core"),
};
// schedule arrays indexed by getUTCDay(): [0]Sun [1]Mon [2]Tue [3]Wed [4]Thu [5]Fri [6]Sat
const WEEKS=[
 {n:1, dl:"Jul 1 – 7",     phase:"Base",   long:7,  total:14, note:"Run-walk intervals (~4 min run / 1 min walk), matched to your real current fitness.",
  sched:[S.rest, S.str, D("Easy run","run",3,"easy","run-walk"), S.strL, D("Easy run","run",4,"easy","run-walk"), S.core, D("Long run","longrun",7,"easy","run-walk")]},
 {n:2, dl:"Jul 8 – 14",    phase:"Base",   long:9,  total:18, note:"Run-walk ratio improves (~6 min run / 1 min walk).",
  sched:[S.rest, S.str, D("Easy run","run",4,"easy","run-walk"), S.strL, D("Easy run","run",5,"easy","run-walk"), S.core, D("Long run","longrun",9,"easy","run-walk")]},
 {n:3, dl:"Jul 15 – 21",   phase:"Base",   long:12, total:23, note:"Shift toward continuous running as it feels comfortable.",
  sched:[S.rest, S.str, D("Easy run","run",5,"easy"), S.strL, D("Easy run","run",6,"easy"), S.core, D("Long run","longrun",12,"easy","walk breaks optional")]},
 {n:4, dl:"Jul 22 – 28",   phase:"Base",   long:15, total:28, note:"Full strength volume resumes; running now continuous (no walk breaks).",
  sched:[S.rest, S.str, D("Easy run","run",6,"easy"), S.str, D("Easy run","run",7,"easy"), S.core, D("Long run","longrun",15,"easy","continuous")]},
 {n:5, dl:"Jul 29 – Aug 4",phase:"Base",   long:18, total:33, note:"Final easy-pace week — the original plan's Week 6 volume now begins here.",
  sched:[S.rest, S.str, D("Easy run","run",7,"easy"), S.str, D("Easy run","run",8,"easy"), S.core, D("Long run","longrun",18,"easy")]},
 {n:6, dl:"Aug 5 – 11",    phase:"Build",  long:22, total:39, note:"Marathon pace begins — Thursday and Saturday both — now that 6 weeks of aerobic base are in place.",
  sched:[S.rest, S.str, D("Easy run","run",8,"easy"), S.str, D("Marathon-pace run","run",9,"mp"), S.core, D("Long run","longrun",22,"mp")]},
 {n:7, dl:"Aug 12 – 18",   phase:"Build",  long:26, total:44, note:"Rehearse race fueling on this 26 km run (see Nutrition → race-week).",
  sched:[S.rest, S.str, D("Easy run","run",8,"easy"), S.str, D("Marathon-pace run","run",10,"mp"), S.core, D("Long run","longrun",26,"mp")]},
 {n:8, dl:"Aug 19 – 25",   phase:"21K Race",long:21,total:32, note:"Medio Maratón de Buenos Aires (Sun 23 Aug). Race it at marathon pace — not faster. Wednesday is core only to stay fresh.",
  sched:[D("21K RACE","race21",21,"race","Medio Maratón — marathon pace, not faster"), S.str, D("Easy run","run",6,"easy"), S.coreOnly, D("Easy shakeout","run",5,"easy","shakeout"), S.rest, S.rest]},
 {n:9, dl:"Aug 26 – Sep 1",phase:"Peak",   long:30, total:50, note:"The defining session. Complete this 30 km and the marathon is a known quantity. Rehearse race fueling here too.",
  sched:[S.rest, S.str, D("Easy run","run",10,"easy"), S.str, D("Marathon-pace run","run",10,"mp"), S.core, D("Long run","longrun",30,"mp")]},
 {n:10,dl:"Sep 2 – 8",     phase:"Taper",  long:22, total:38, note:"Taper begins — strength drops to light or core only.",
  sched:[S.rest, D("Strength — lower body (light)","strengthLight"), D("Easy run","run",8,"easy"), S.coreOnly, D("Marathon-pace run","run",8,"mp"), S.core, D("Long run","longrun",22,"mp")]},
 {n:11,dl:"Sep 9 – 15",    phase:"Taper",  long:14, total:25, note:"No strength sessions — legs need to arrive fresh.",
  sched:[S.rest, S.coreOnly, D("Easy run","run",6,"easy"), S.coreOnly, D("Easy run","run",5,"easy"), S.rest, D("Long run","longrun",14,"easy")]},
 {n:12,dl:"Sep 16 – 20",   phase:"Race Week",long:null,total:9, note:"Race week — short shakeouts only, no strength. In-window shakeout is Wed (4 km); the plan's other 5 km shakeout falls the day after the race. Sun 20 Sep: RACE, 42.195 km.",
  sched:[D("MARATHON — 42.195 km","race42",42,"race","Race day!"), D("Easy shakeout","run",5,"easy","flexible — falls day after race in-calendar"), S.rest, D("Easy shakeout","run",4,"easy","shakeout"), S.rest, D("Rest (kit pickup)","rest"), S.rest]},
];
const DOW_ORDER=[1,2,3,4,5,6,0]; // Mon..Sun for display
const DOW_LBL={0:"Sun",1:"Mon",2:"Tue",3:"Wed",4:"Thu",5:"Fri",6:"Sat"};

const CARB={ light:{gkg:"3–5 g/kg", g:"270–450 g"}, mod:{gkg:"5–7 g/kg", g:"450–630 g"}, high:{gkg:"6–10 g/kg", g:"540–900 g"} };
const PROTEIN="160–180 g", FAT="75–90 g";
const DAYTYPES=[ // for the Nutrition reference table (verbatim from plan)
 {t:"Rest / core-mobility", ex:"Sunday, Friday", kcal:"2,700–2,800", carb:"light"},
 {t:"Strength only", ex:"Monday, Wednesday", kcal:"3,000–3,100", carb:"mod"},
 {t:"Easy mid-week run", ex:"~8 km", kcal:"~3,400", carb:"mod"},
 {t:"Quality / marathon-pace run", ex:"~10 km", kcal:"~3,600", carb:"mod"},
 {t:"Long run (build phase)", ex:"~26 km", kcal:"~5,000", carb:"high"},
 {t:"Peak long run", ex:"~30 km", kcal:"~5,400", carb:"high"},
];
const RECIPES=[
 {m:"Breakfast", n:"Eggs & Oats Bowl", ing:"3 whole eggs + 3 egg whites · 60–80 g oats · 1 banana · coffee", mac:"≈ 640 kcal · 39 g P · 20 g F · 76 g C", up:"Run days: oats → 100 g, add 1 tbsp honey on long-run mornings (+~175 kcal, +37 g C)"},
 {m:"Lunch", n:"Chicken & Rice Bowl", ing:"150–180 g chicken or lean beef · 150–200 g rice or potatoes · vegetables · 1 tbsp olive oil", mac:"≈ 675 kcal · 58 g P · 21 g F · 59 g C", up:"Run days: rice/potatoes → 250–300 g (+~130 kcal, +28 g C)"},
 {m:"Snack", n:"Greek Yogurt & Whey", ing:"200 g Greek yogurt · 30 g whey · handful of berries", mac:"≈ 290 kcal · 44 g P · 6 g F · 20 g C", up:"Run days: add a bagel or rice cakes pre-run (+~250 kcal, +49 g C)"},
 {m:"Dinner", n:"Steak & Potatoes", ing:"150–200 g steak / fish / chicken · 150–200 g rice or potatoes · big salad · 1 tbsp olive oil", mac:"≈ 630 kcal · 55 g P · 28 g F · 42 g C", up:"Long-run days: add a second carb side (+~195 kcal, +42 g C)"},
 {m:"Post-run · within 1 hr", n:"Recovery Smoothie", ing:"1 banana · 30 g whey · 40 g oats · 300 ml milk  (or a rice + chicken bowl)", mac:"≈ 530 kcal · 39 g P · 10 g F · 72 g C", up:"Target 1.0–1.2 g/kg carbs in this window (≈ 90–108 g). Only on run days."},
];
const RACEFUEL={
 load:"Carb-load Fri–Sat before the Sunday race: 10–12 g/kg/day ≈ 900–1,080 g carbs, spread over 5–6 meals/snacks. Easily digestible starches; reduce fibre in the final 36 h. Nothing new.",
 during:"Default: 1 gel every 40–45 min ≈ 30–40 g carb/hr. Build toward 60–90 g/hr (gel + isotonic from km 10) — but rehearse the exact rate on the Week 7 (26 km) and Week 9 (30 km) long runs. Never try a new fuelling rate on race day.",
 hydra:"400–800 mL/hr. Sodium 500–700 mg per litre of fluid (or 1–2 g salt/hr). Buenos Aires in September is spring — dial in your personal sweat rate on long runs.",
};
const SUPPS=[
 {n:"Creatine monohydrate", d:"5 g/day", note:"Well-supported for strength/muscle; compatible with running volume."},
 {n:"Whey protein", d:"as needed", note:"Easiest way to hit the 160–180 g/day protein target."},
 {n:"Vitamin D3 / K2", d:"continue", note:"Get 25-OH vitamin D tested — never measured."},
 {n:"Iron", d:"do NOT supplement blindly", note:"Get ferritin tested first — marathon volume causes iron loss via foot-strike hemolysis."},
];
const RACE_STRATEGY=[
 ["Corral","Last or second-to-last. Declare a 4:15 finish at registration."],
 ["Km 0–15","6:10/km. It will feel too slow — that is exactly right. Don't chase the crowd."],
 ["Km 15–30","Hold 6:10/km. Save the legs."],
 ["Aid stations","Walk every one (30–45 s). Water + isotonic from km 10. Gel every 40–45 min."],
 ["Km 30–35","This is where the race starts. Shorten your stride, not your pace."],
 ["Km 35–42","If the first half was honest, push from km 38."],
 ["Target","4:13–4:22 hrs — sub-4:15 is a strong first marathon from your base."],
];
const WARMUP="Before every run (5 min): leg swings (front/back + lateral), hip circles, high knees, walking lunges, ankle rotations. Never skip it.";
const COOLDOWN="After every run (10 min): stretch hip flexors, quads, hamstrings, calves/Achilles, IT band — 30–45 s each. Foam-roll calves + IT band after long runs.";
const STRENGTH_DESC="Squats, reverse lunges, single-leg deadlifts, hip thrusts, calf raises, lateral band walks — 3×8–12. Focus on glutes & hip stability (they protect the knees at km 30+).";
const CORE_DESC="Planks, dead bugs, glute bridges, hip-flexor stretches, banded clamshells — 20–30 min. No heavy leg work.";
const REDS_SIGNS="Persistent fatigue · poor sleep · mood dips · getting sick more often · low libido · performance decline. If these appear, the fix is more food, not less.";

/* ============================================================
   DATE / RESOLUTION  (UTC day-indices → DST-safe)
   ============================================================ */
function pad(n){return(n<10?"0":"")+n;}
function iso(y,m,d){return y+"-"+pad(m)+"-"+pad(d);}
function parseISO(s){const p=s.split("-").map(Number);return{y:p[0],m:p[1],d:p[2]};}
function idxOf(y,m,d){return Math.floor(Date.UTC(y,m-1,d)/86400000);}
function idxISO(s){const p=parseISO(s);return idxOf(p.y,p.m,p.d);}
function dowOf(y,m,d){return new Date(Date.UTC(y,m-1,d)).getUTCDay();}
function addDaysISO(s,n){const p=parseISO(s);const dt=new Date(Date.UTC(p.y,p.m-1,p.d)+n*86400000);return iso(dt.getUTCFullYear(),dt.getUTCMonth()+1,dt.getUTCDate());}
function todayObj(){const d=new Date();return{y:d.getFullYear(),m:d.getMonth()+1,d:d.getDate()};}
function todayISO(){const t=todayObj();return iso(t.y,t.m,t.d);}
const START_IDX=idxISO(START_ISO), RACE_IDX=idxISO(RACE_ISO);
function fmtNice(s){const p=parseISO(s);const dt=new Date(Date.UTC(p.y,p.m-1,p.d));
  const M=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const W=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  return W[dt.getUTCDay()]+", "+M[p.m-1]+" "+p.d;}
function fmtShort(s){const p=parseISO(s);const M=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return M[p.m-1]+" "+p.d;}

function resolveDay(dISO){
  const p=parseISO(dISO), di=idxOf(p.y,p.m,p.d)-START_IDX;
  const toRace=RACE_IDX-idxOf(p.y,p.m,p.d);
  if(di<0)  return {state:"pre",  daysToStart:-di, toRace};
  if(di>PLAN_LEN-1) return {state:"post", toRace};
  const weekNum=Math.min(12,Math.floor(di/7)+1);
  const wk=WEEKS[weekNum-1];
  const dow=dowOf(p.y,p.m,p.d);
  const day=wk.sched[dow];
  return {state:"active", di, toRace, weekNum, phase:wk.phase, dow, day, week:wk, nutrition:nutritionFor(day)};
}
function r10(n){return Math.round(n/10)*10;}
function nutritionFor(day){
  const k=day.kind, km=day.km;
  if(k==="race42") return {label:"Race day", race:true};
  if(k==="rest"||k==="core") return {label:"Rest / core-mobility", kcal:"2,700–2,800", carb:CARB.light};
  if(k==="strength"||k==="strengthLight") return {label:"Strength day", kcal:"3,000–3,100", carb:CARB.mod};
  const lo=r10(2700+90*km), hi=r10(2800+90*km);
  const kcal="~"+lo.toLocaleString()+"–"+hi.toLocaleString();
  if(k==="run") return {label: day.pace==="mp"?"Quality / MP run":"Easy run", kcal, carb:CARB.mod, derived:true, km};
  if(k==="longrun") return {label:"Long-run day", kcal, carb: km>=15?CARB.high:CARB.mod, derived:true, km};
  if(k==="race21") return {label:"21K race day", kcal, carb:CARB.high, derived:true, km};
  return {label:"—", kcal:"—", carb:CARB.mod};
}
function paceBounds(kind){ // seconds/km [lo,hi]
  if(kind==="easy")return[390,420]; if(kind==="mp")return[360,375]; if(kind==="race")return[360,370]; return null;
}

function daysHtml(wk,curDow){
  return DOW_ORDER.map(dow=>{
    const d=wk.sched[dow]; const isToday=dow===curDow;
    let val=esc(d.t), sub="";
    if(d.km&&d.kind!=="race42"){val=d.km+" km · "+esc(d.t); }
    if(d.pace){sub=d.pace==="mp"?"marathon pace 6:00–6:15":d.pace==="race"?"race pace 6:00–6:10":"easy 6:30–7:00";}
    else if(d.kind==="strength"||d.kind==="strengthLight"){sub="3×8–12 lower body"+(d.kind==="strengthLight"?" (2 sets)":"");}
    else if(d.kind==="core"){sub="20–30 min, no heavy legs";}
    if(d.note&&d.note!=="Race day!"&&d.kind!=="race42")sub+=(sub?" · ":"")+esc(d.note);
    return `<div class="drow ${isToday?'today':''}"><div class="dd">${DOW_LBL[dow]}</div><div class="dv">${val}${sub?`<div class="dk">${sub}</div>`:''}</div></div>`;
  }).join("");
}
function toggleWeek(n){
  const el=document.querySelector('.wk[data-wk="'+n+'"]'); el.classList.toggle("open");

}

function parseTime(s){s=(s||"").trim();if(!s)return null;const p=s.split(":").map(Number);if(p.some(isNaN))return null;
  if(p.length===3)return p[0]*3600+p[1]*60+p[2]; if(p.length===2)return p[0]*60+p[1]; if(p.length===1)return p[0]*60; return null;}
function fmtPace(sec){var s=Math.round(sec);return Math.floor(s/60)+":"+pad(s%60);}
function saveRun(){
  const date=document.getElementById("run-date").value||todayISO();
  const dist=parseFloat(document.getElementById("run-dist").value);
  const timeSec=parseTime(document.getElementById("run-time").value);
  const rpe=document.getElementById("run-rpe").value;
  const notes=document.getElementById("run-notes").value.trim();
  if(!dist||dist<=0){toast("Enter a distance");return;}
  let pace=null, verdict=null, verdictClass="", planTxt="";
  if(timeSec){const ps=timeSec/dist; pace=fmtPace(ps);
    const rr=resolveDay(date);
    if(rr.state==="active"&&rr.day.pace){
      const b=paceBounds(rr.day.pace); const pl=rr.day.pace==="mp"?PACE.mp:rr.day.pace==="race"?PACE.race:PACE.easy;
      planTxt="planned "+pl;
      if(ps<b[0]-3){verdict="faster than planned";verdictClass="mp";}
      else if(ps>b[1]+3){verdict="slower than planned";verdictClass="";}
      else{verdict="in zone ✓";verdictClass="good";}
    } else if(rr.state==="active"&&rr.day.km===0){planTxt=(rr.day.kind==="strength"||rr.day.kind==="strengthLight")?"strength day in plan":rr.day.kind==="core"?"core / mobility day in plan":"rest day in plan";}
  }
  const runs=load(K.runs); runs.push({date,dist,timeSec,pace,rpe,notes,verdict,verdictClass,plan:planTxt});
  runs.sort((a,b)=>a.date<b.date?-1:1); save(K.runs,runs);
  toast(verdict?("Saved · "+verdict):"Run saved"); renderProgress();
}
function saveWeight(){
  const date=document.getElementById("wt-date").value||todayISO();
  const kg=parseFloat(document.getElementById("wt-kg").value);
  if(!kg||kg<=0){toast("Enter a weight");return;}
  const wts=load(K.wt).filter(w=>w.date!==date); wts.push({date,kg});
  wts.sort((a,b)=>a.date<b.date?-1:1); save(K.wt,wts); toast("Weigh-in saved"); renderProgress();
}
function delItem(key,idx){const a=load(key);a.splice(idx,1);save(key,a);renderProgress();toast("Deleted");}

function weightChart(wts){
  if(wts.length<2)return `<div class="empty">Log at least 2 weigh-ins to see the trend.</div>`;
  // 7-day trailing rolling average per logged day (sort defensively for order-independence)
  const pts=wts.map(w=>({i:idxISO(w.date),kg:w.kg,date:w.date})).sort((a,b)=>a.i-b.i);
  const roll=pts.map(p=>{const win=pts.filter(q=>q.i<=p.i&&q.i>p.i-7);const avg=win.reduce((s,q)=>s+q.kg,0)/win.length;return{i:p.i,kg:avg,date:p.date};});
  const W=320,H=150,PADL=34,PADR=8,PADT=10,PADB=20;
  const xs=pts.map(p=>p.i),ys=pts.map(p=>p.kg).concat(roll.map(p=>p.kg));
  let minI=Math.min(...xs),maxI=Math.max(...xs);if(maxI===minI)maxI=minI+1;
  let minY=Math.min(...ys),maxY=Math.max(...ys);const padY=Math.max(0.4,(maxY-minY)*0.15);minY-=padY;maxY+=padY;
  const X=i=>PADL+(i-minI)/(maxI-minI)*(W-PADL-PADR);
  const Y=k=>PADT+(maxY-k)/(maxY-minY)*(H-PADT-PADB);
  const rawPts=pts.map(p=>`<circle cx="${X(p.i).toFixed(1)}" cy="${Y(p.kg).toFixed(1)}" r="2" fill="var(--sub)" opacity=".45"/>`).join("");
  const line=roll.map((p,i)=>(i?"L":"M")+X(p.i).toFixed(1)+" "+Y(p.kg).toFixed(1)).join(" ");
  // y gridlines
  const g1=maxY,g2=minY,gm=(maxY+minY)/2;
  const grid=[g1,gm,g2].map(g=>`<line x1="${PADL}" y1="${Y(g).toFixed(1)}" x2="${W-PADR}" y2="${Y(g).toFixed(1)}" stroke="var(--hair)" stroke-width="1"/><text x="2" y="${(Y(g)+3).toFixed(1)}" font-size="9" fill="var(--sub)">${g.toFixed(1)}</text>`).join("");
  const first=roll[0],last=roll[roll.length-1],delta=(last.kg-first.kg);
  return `<div style="margin-top:10px"><svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    ${grid}${rawPts}<path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="${PADL}" y="${H-6}" font-size="9" fill="var(--sub)">${fmtShort(first.date)}</text>
    <text x="${W-PADR}" y="${H-6}" font-size="9" fill="var(--sub)" text-anchor="end">${fmtShort(last.date)}</text></svg>
    <div class="tiny" style="text-align:center">7-day avg: <b>${last.kg.toFixed(1)} kg</b> · ${delta>=0?"+":""}${delta.toFixed(1)} kg since ${fmtShort(first.date)}</div></div>`;
}

/* RED-S weekly check-in */
const REDS_Q=[
 {k:"fatigue", q:"Energy / fatigue", good:"Fresh", bad:"Wiped out"},
 {k:"sleep",   q:"Sleep quality",   good:"Good",  bad:"Poor"},
 {k:"mood",    q:"Mood",            good:"Good",  bad:"Low / irritable"},
 {k:"illness", q:"Illness",         good:"Healthy",bad:"Getting sick"},
 {k:"motivation",q:"Motivation to train", good:"High", bad:"Low"},
];
let redsDraft={};
function redsCard(chks){
  const last=chks.length?chks[chks.length-1]:null;
  let html=`<div class="card"><h2>Weekly under-fuelling check-in</h2>
    <div class="tiny" style="margin-bottom:8px">A quick RED-S scan. Answer honestly; if negatives stack up, the fix is <b>more food, not less</b>.</div>`;
  REDS_Q.forEach(q=>{
    const cur=redsDraft[q.k];
    html+=`<label class="fl">${esc(q.q)}</label><div class="seg bad" data-q="${q.k}">
      <button class="${cur==='good'?'':''}" onclick="setReds('${q.k}','good',this)" data-v="good" style="${cur==='good'?'background:var(--good);border-color:var(--good);color:#fff':''}">${esc(q.good)}</button>
      <button onclick="setReds('${q.k}','bad',this)" data-v="bad" class="${cur==='bad'?'on':''}">${esc(q.bad)}</button></div>`;
  });
  html+=`<button class="btn" onclick="saveReds()">Save check-in</button>`;
  if(last){
    const neg=REDS_Q.filter(q=>last[q.k]==="bad");
    let cls="ok",msg=`Last check-in (${fmtShort(last.date)}): all clear — keep fuelling.`;
    if(neg.length>=3){cls="bad";msg=`⚠️ Last check-in (${fmtShort(last.date)}): ${neg.length} warning signs (${neg.map(n=>n.q.toLowerCase()).join(", ")}). Classic under-fuelling stack — eat more, ease off if it persists.`;}
    else if(neg.length>=1){cls="warn";msg=`Last check-in (${fmtShort(last.date)}): ${neg.length} sign${neg.length>1?"s":""} to watch (${neg.map(n=>n.q.toLowerCase()).join(", ")}). Add carbs; recheck in a few days.`;}
    html+=`<div class="flag ${cls}">${msg}</div>`;
  }
  html+=`</div>`;
  return html;
}
function setReds(k,val,btn){
  redsDraft[k]=val;
  const grp=btn.parentElement;
  grp.querySelectorAll("button").forEach(b=>{b.classList.remove("on");b.style.background="";b.style.borderColor="";b.style.color="";});
  if(val==="good"){btn.style.background="var(--good)";btn.style.borderColor="var(--good)";btn.style.color="#fff";}
  else btn.classList.add("on");
}
function saveReds(){
  if(Object.keys(redsDraft).length<REDS_Q.length){toast("Answer all 5");return;}
  const chks=load(K.chk); chks.push(Object.assign({date:todayISO()},redsDraft));
  save(K.chk,chks); redsDraft={}; toast("Check-in saved"); renderProgress();
}

/* history heatmap over the plan window */
function historyCard(runs,wts,chks){
  const runSet=new Set(runs.map(r=>r.date)), wtSet=new Set(wts.map(w=>w.date));
  let html=`<div class="card"><h2>History</h2><div class="tiny" style="margin-bottom:8px">Each column is a plan week (Wed→Tue). <span style="color:var(--accent)">■</span> run logged · <span style="color:var(--good)">■</span> weigh-in.</div><div class="hm">`;
  for(let w=0;w<12;w++){
    html+=`<div class="col">`;
    for(let d=0;d<7;d++){
      const dISO=addDaysISO(START_ISO,w*7+d);
      if(idxISO(dISO)>RACE_IDX+2){html+=`<div class="cell" style="opacity:.25"></div>`;continue;}
      const hasR=runSet.has(dISO),hasW=wtSet.has(dISO),isT=dISO===todayISO();
      let cls="cell";if(hasR&&hasW)cls+=" rw";else if(hasR)cls+=" r";else if(hasW)cls+=" w";if(isT)cls+=" today";
      html+=`<div class="${cls}" title="${dISO}"></div>`;
    }
    html+=`</div>`;
  }
  html+=`</div>`;
  const logged=new Set([...runSet,...wtSet].filter(d=>idxISO(d)>=START_IDX&&idxISO(d)<=RACE_IDX)).size;
  html+=`<div class="tiny" style="margin-top:8px">${runs.length} run${runs.length!==1?"s":""} · ${wts.length} weigh-in${wts.length!==1?"s":""} · ${chks.length} check-in${chks.length!==1?"s":""} logged.</div></div>`;
  return html;
}

/* backup */
function exportData(){
  const data={runs:load(K.runs),weights:load(K.wt),checkins:load(K.chk),exported:todayISO(),v:1};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="ba-marathon-backup-"+todayISO()+".json";a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000); toast("Exported");
}
function importData(input){
  const f=input.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=()=>{try{const d=JSON.parse(rd.result);
    const byDate=(a,b)=>a.date<b.date?-1:1;
    if(d.runs)save(K.runs,d.runs.slice().sort(byDate));
    if(d.weights)save(K.wt,d.weights.slice().sort(byDate));
    if(d.checkins)save(K.chk,d.checkins.slice().sort(byDate));
    toast("Imported");renderProgress();}catch(e){toast("Bad file");}};
  rd.readAsText(f); input.value="";
}
